<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <style>
      .label { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #1e293b; }
      .subtext { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #64748b; }
      .box { stroke-width: 2; rx: 8; }
      .line { stroke: #cbd5e1; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
  </defs>

  <g transform="translate(50, 150)">
    <rect width="180" height="100" class="box" fill="#eff6ff" stroke="#3b82f6" />
    <text x="90" y="45" text-anchor="middle" class="label">Campaign Proposition</text>
    <text x="90" y="65" text-anchor="middle" class="subtext">Strategy, Briefing &amp;</text>
    <text x="90" y="80" text-anchor="middle" class="subtext">Creative Concept</text>
  </g>

  <line x1="230" y1="200" x2="280" y2="200" class="line" />

  <g transform="translate(290, 150)">
    <rect width="180" height="100" class="box" fill="#fefce8" stroke="#eab308" />
    <text x="90" y="45" text-anchor="middle" class="label">Data Check</text>
    <text x="90" y="65" text-anchor="middle" class="subtext">Availability, Quality &amp;</text>
    <text x="90" y="80" text-anchor="middle" class="subtext">Consent Validation</text>
  </g>

  <line x1="470" y1="200" x2="520" y2="200" class="line" />

  <g transform="translate(530, 150)">
    <rect width="180" height="100" class="box" fill="#f0fdf4" stroke="#22c55e" />
    <text x="90" y="45" text-anchor="middle" class="label">Audience Builder</text>
    <text x="90" y="65" text-anchor="middle" class="subtext">Segmentation, Logic &amp;</text>
    <text x="90" y="80" text-anchor="middle" class="subtext">Suppression Rules</text>
  </g>

  <line x1="710" y1="200" x2="760" y2="200" class="line" />

  <g transform="translate(770, 150)">
    <rect width="180" height="100" class="box" fill="#faf5ff" stroke="#a855f7" />
    <text x="90" y="45" text-anchor="middle" class="label">Activation</text>
    <text x="90" y="65" text-anchor="middle" class="subtext">Channel Push (Social,</text>
    <text x="90" y="80" text-anchor="middle" class="subtext">Email, Programmatic)</text>
  </g>

  <path d="M 860 250 Q 860 350 500 350 Q 140 350 140 250" class="line" style="stroke-dasharray: 5,5; stroke: #94a3b8;" />
  
  <g transform="translate(410, 310)">
    <rect width="180" height="60" rx="30" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
    <text x="90" y="28" text-anchor="middle" class="label" style="font-size: 12px;">Performance Measurement</text>
    <text x="90" y="45" text-anchor="middle" class="subtext">KPI Tracking &amp; Attribution</text>
  </g>

  <text x="50" y="50" class="label" style="font-size: 24px; fill: #0f172a;">Campaign Activation Schema</text>
  <text x="50" y="75" class="subtext" style="font-size: 14px;">End-to-end workflow from strategy to measurable results</text>
</svg>
