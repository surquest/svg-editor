<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Studio</title>
  <!-- Tailwind CSS for rapid styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for the code editor */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e1e24; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    
    /* Checkerboard pattern for canvas background */
    .canvas-bg {
      background-image: 
        linear-gradient(45deg, #f0f0f0 25%, transparent 25%), 
        linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #f0f0f0 75%), 
        linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #ffffff;
    }

    /* Make text inside SVG unselectable to prevent weird drag highlighting */
    svg text {
      user-select: none;
      -webkit-user-select: none;
    }
    
    /* Uniform color input styling */
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 1px solid #d1d5db; border-radius: 4px; }
  </style>
</head>
<body class="h-screen w-full flex flex-col bg-gray-100 text-slate-800 font-sans overflow-hidden">

  <!-- Top Toolbar -->
  <header class="bg-white border-b border-gray-200 px-4 py-3 flex flex-wrap items-center justify-between shadow-sm z-10 shrink-0">
    <div class="flex items-center space-x-4">
      <h1 class="text-lg font-bold text-indigo-600 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        SVG Studio
      </h1>
      <div class="h-6 w-px bg-gray-300"></div>
      <div class="flex space-x-2">
        <button id="btn-add-rect" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded-md transition-colors border border-gray-200">
          + Rectangle
        </button>
        <button id="btn-add-circle" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded-md transition-colors border border-gray-200">
          + Circle
        </button>
        <button id="btn-add-line" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded-md transition-colors border border-gray-200">
          + Line
        </button>
        <button id="btn-add-text" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-sm font-medium rounded-md transition-colors border border-gray-200">
          + Text
        </button>
      </div>
    </div>
    
    <div class="flex items-center space-x-2 mt-2 sm:mt-0">
      <button id="btn-group" disabled class="px-3 py-1.5 bg-gray-50 text-gray-400 text-sm font-medium rounded-md transition-colors border border-gray-200 cursor-not-allowed opacity-60">
        Group
      </button>
      <button id="btn-ungroup" disabled class="px-3 py-1.5 bg-gray-50 text-gray-400 text-sm font-medium rounded-md transition-colors border border-gray-200 cursor-not-allowed opacity-60">
        Ungroup
      </button>

      <!-- Layering Button Group -->
      <div class="flex items-center bg-white border border-gray-300 rounded-md shadow-sm ml-2">
        <button id="btn-bring-front" disabled class="p-1.5 hover:bg-gray-50 border-r border-gray-200 text-gray-400 transition-colors cursor-not-allowed opacity-60" title="Bring to Front">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 18h-8a2 2 0 0 1-2-2v-8"></path><rect x="10" y="6" width="10" height="10" rx="2"></rect></svg>
        </button>
        <button id="btn-send-back" disabled class="p-1.5 hover:bg-gray-50 text-gray-400 transition-colors cursor-not-allowed opacity-60" title="Send to Back">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h8a2 2 0 0 1 2 2v8"></path><rect x="4" y="10" width="10" height="10" rx="2"></rect></svg>
        </button>
      </div>
      
      <!-- Alignment Button Group -->
      <div class="flex items-center bg-white border border-gray-300 rounded-md shadow-sm ml-2">
        <button id="btn-align-left" class="p-1.5 hover:bg-gray-50 border-r border-gray-200 text-gray-600 transition-colors" title="Align Left">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="22" x2="4" y2="2"></line><rect x="8" y="6" width="10" height="12" rx="2"></rect></svg>
        </button>
        <button id="btn-align-center-h" class="p-1.5 hover:bg-gray-50 border-r border-gray-200 text-gray-600 transition-colors" title="Align Center Horizontally">
           <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"></line><rect x="6" y="8" width="12" height="8" rx="2"></rect></svg>
        </button>
        <button id="btn-align-right" class="p-1.5 hover:bg-gray-50 border-r border-gray-200 text-gray-600 transition-colors" title="Align Right">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="20" y1="22" x2="20" y2="2"></line><rect x="6" y="6" width="10" height="12" rx="2"></rect></svg>
        </button>
        <button id="btn-align-top" class="p-1.5 hover:bg-gray-50 border-r border-gray-200 text-gray-600 transition-colors" title="Align Top">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="4" x2="2" y2="4"></line><rect x="6" y="8" width="12" height="10" rx="2"></rect></svg>
        </button>
        <button id="btn-align-center-v" class="p-1.5 hover:bg-gray-50 border-r border-gray-200 text-gray-600 transition-colors" title="Align Center Vertically">
           <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="12" x2="22" y2="12"></line><rect x="8" y="6" width="8" height="12" rx="2"></rect></svg>
        </button>
        <button id="btn-align-bottom" class="p-1.5 hover:bg-gray-50 text-gray-600 transition-colors" title="Align Bottom">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="20" x2="2" y2="20"></line><rect x="6" y="6" width="12" height="10" rx="2"></rect></svg>
        </button>
      </div>

      <button id="btn-undo" disabled class="px-3 py-1.5 bg-gray-50 text-gray-400 text-sm font-medium rounded-md transition-colors border border-gray-200 ml-2 flex items-center gap-1 cursor-not-allowed opacity-60" title="Undo (Ctrl+Z)">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>

      <button id="btn-clear" class="px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 text-sm font-medium rounded-md transition-colors border border-red-200 ml-2">
        Clear All
      </button>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="flex-1 flex flex-col md:flex-row overflow-hidden bg-gray-100 relative">
    
    <!-- Left Panel: Code Editor -->
    <div id="code-panel" class="w-full md:w-1/4 h-[25%] md:h-full bg-[#1e1e24] flex flex-col border-r border-gray-800 shrink-0 shadow-lg z-10" style="min-width: 150px; min-height: 100px;">
      <div class="bg-[#282a36] px-4 py-2 flex justify-between items-center shrink-0">
        <span class="text-xs font-mono text-gray-400 uppercase tracking-wider">code.svg</span>
        <span class="text-xs text-green-400 opacity-0 transition-opacity duration-300" id="sync-indicator">Synced ✓</span>
      </div>
      
      <!-- Specialized Code Area with Backdrop -->
      <div class="relative flex-1 w-full bg-[#1e1e24] overflow-hidden">
        <div id="code-backdrop" class="absolute inset-0 p-4 font-mono text-[13px] leading-relaxed whitespace-pre text-transparent pointer-events-none overflow-hidden break-normal"></div>
        <textarea id="svg-code" class="absolute inset-0 w-full h-full bg-transparent text-gray-300 font-mono text-[13px] p-4 resize-none outline-none leading-relaxed whitespace-pre m-0 border-none focus:ring-0" spellcheck="false"></textarea>
      </div>
    </div>

    <!-- Panel Resizer (Code Editor to Canvas) -->
    <div id="panel-resizer" class="w-full h-1 md:w-1 md:h-full bg-gray-700 hover:bg-indigo-500 cursor-row-resize md:cursor-col-resize z-20 shrink-0 transition-colors"></div>

    <!-- Center Panel: Canvas Viewer -->
    <div class="flex-1 h-[50%] md:h-full flex flex-col relative shrink-0 overflow-hidden">
      <div class="absolute inset-0 overflow-auto flex items-center justify-center p-4">
        
        <!-- Vanilla SVG Container -->
        <div id="canvas-container" class="relative w-[600px] h-[500px] canvas-bg shadow-xl border border-gray-300 rounded-sm overflow-hidden select-none">
          <!-- Render Target -->
          <div id="svg-render-target" class="w-full h-full"></div>
          
          <!-- Native Selection Overlay -->
          <div id="selection-overlay" class="absolute border border-indigo-500 pointer-events-none hidden z-10" style="background: rgba(79, 70, 229, 0.05);">
            <!-- Standard Resize Handles (All 8 directions) -->
            <div id="handle-tl" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-sm -left-1.5 -top-1.5 cursor-nw-resize pointer-events-auto resize-handle standard-handle"></div>
            <div id="handle-t" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-sm left-1/2 -top-1.5 -translate-x-1/2 cursor-n-resize pointer-events-auto resize-handle standard-handle"></div>
            <div id="handle-tr" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-sm -right-1.5 -top-1.5 cursor-ne-resize pointer-events-auto resize-handle standard-handle"></div>
            <div id="handle-l" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-sm -left-1.5 top-1/2 -translate-y-1/2 cursor-w-resize pointer-events-auto resize-handle standard-handle"></div>
            <div id="handle-r" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-sm -right-1.5 top-1/2 -translate-y-1/2 cursor-e-resize pointer-events-auto resize-handle standard-handle"></div>
            <div id="handle-bl" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-sm -left-1.5 -bottom-1.5 cursor-sw-resize pointer-events-auto resize-handle standard-handle"></div>
            <div id="handle-b" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-sm left-1/2 -bottom-1.5 -translate-x-1/2 cursor-s-resize pointer-events-auto resize-handle standard-handle"></div>
            <div id="handle-br" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-sm -right-1.5 -bottom-1.5 cursor-se-resize pointer-events-auto resize-handle standard-handle"></div>
            
            <!-- Line Specific Resize Handles -->
            <div id="handle-line-p1" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-full -translate-x-1.5 -translate-y-1.5 cursor-crosshair pointer-events-auto resize-handle line-handle hidden"></div>
            <div id="handle-line-p2" class="absolute w-3 h-3 bg-white border border-indigo-500 rounded-full -translate-x-1.5 -translate-y-1.5 cursor-crosshair pointer-events-auto resize-handle line-handle hidden"></div>
          </div>
          
          <!-- Marquee Selection Box -->
          <div id="marquee-box" class="absolute border border-blue-500 pointer-events-none hidden z-20" style="background: rgba(59, 130, 246, 0.2);"></div>
        </div>

      </div>
      
      <!-- Instructions overlay -->
      <div class="absolute bottom-4 right-4 bg-white/90 backdrop-blur text-xs text-gray-600 px-3 py-2 rounded shadow border border-gray-200 pointer-events-none">
        Select: Click &bull; Multi-select: Shift + Click &bull; Delete: Backspace/Del
      </div>
    </div>

    <!-- Right Panel: Properties Sidebar -->
    <div id="properties-panel" class="w-full md:w-64 h-[25%] md:h-full bg-white border-l border-gray-200 flex flex-col shrink-0 overflow-y-auto shadow-[-2px_0_10px_rgba(0,0,0,0.03)] z-10">
      <div class="bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center shrink-0">
        <h2 class="text-xs font-bold text-gray-600 uppercase tracking-wider">Properties</h2>
      </div>
      <div id="properties-content" class="p-4 flex flex-col gap-3">
        <p id="properties-placeholder" class="text-xs text-gray-400 italic text-center mt-4">Select a single object to edit its properties.</p>
        <!-- Fields injected here dynamically -->
      </div>
    </div>
    
  </main>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 z-50 pointer-events-none"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      // -- DOM Elements --
      const codeEl = document.getElementById('svg-code');
      const backdropEl = document.getElementById('code-backdrop');
      const syncIndicator = document.getElementById('sync-indicator');
      const renderTarget = document.getElementById('svg-render-target');
      const selectionOverlay = document.getElementById('selection-overlay');
      const canvasContainer = document.getElementById('canvas-container');
      const codePanel = document.getElementById('code-panel');
      const panelResizer = document.getElementById('panel-resizer');

      // -- State --
      let selectedElements = [];
      let isSyncing = false;
      let syncTimeout;
      let undoStack = [];
      let marqueeStart = null;
      let currentPropElement = null; // Track selected element for sidebar
      let isResizingCodePanel = false;

      // Default initial SVG content
      const defaultSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <rect x="150" y="100" width="120" height="120" fill="#4f46e5" rx="8" ry="8" />
  <circle cx="350" cy="160" r="60" fill="#ec4899" />
  <polygon points="250,280 180,400 320,400" fill="#10b981" />
  <text x="50" y="50" font-family="sans-serif" font-size="24" fill="#333">SVG Studio</text>
</svg>`;

      codeEl.value = defaultSVG;

      // Ensure exact scroll synchronization between code editor and backdrop layer
      codeEl.addEventListener('scroll', () => {
          backdropEl.scrollTop = codeEl.scrollTop;
          backdropEl.scrollLeft = codeEl.scrollLeft;
      });

      // -- Resizer Logic --
      panelResizer.addEventListener('mousedown', (e) => {
        isResizingCodePanel = true;
        document.body.style.cursor = window.innerWidth >= 768 ? 'col-resize' : 'row-resize';
        e.preventDefault(); // Prevent text selection
      });

      window.addEventListener('mousemove', (e) => {
        if (!isResizingCodePanel) return;

        if (window.innerWidth >= 768) {
          // Desktop: Horizontal resize
          const newWidth = e.clientX;
          // Ensure min 150px and leave room for canvas & right panel (~300px buffer)
          if (newWidth > 150 && newWidth < window.innerWidth - 300) {
            codePanel.style.width = `${newWidth}px`;
            codePanel.style.flex = 'none'; // Overrides Tailwind classes
          }
        } else {
          // Mobile: Vertical resize
          const mainRect = document.querySelector('main').getBoundingClientRect();
          const newHeight = e.clientY - mainRect.top;
          // Ensure min 100px and leave room
          if (newHeight > 100 && newHeight < mainRect.height - 150) {
            codePanel.style.height = `${newHeight}px`;
            codePanel.style.flex = 'none';
          }
        }
      });

      window.addEventListener('mouseup', () => {
        if (isResizingCodePanel) {
          isResizingCodePanel = false;
          document.body.style.cursor = '';
        }
      });

      // -- Utilities --
      function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        const bgColors = {
          info: 'bg-gray-800 text-white',
          error: 'bg-red-600 text-white',
          success: 'bg-green-600 text-white'
        };
        toast.className = `${bgColors[type]} px-4 py-2 rounded shadow-lg text-sm font-medium transition-all duration-300 transform translate-y-4 opacity-0`;
        toast.textContent = message;
        container.appendChild(toast);
        requestAnimationFrame(() => toast.classList.remove('translate-y-4', 'opacity-0'));
        setTimeout(() => {
          toast.classList.add('opacity-0');
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      function flashSyncIndicator() {
        syncIndicator.classList.remove('opacity-0');
        clearTimeout(syncTimeout);
        syncTimeout = setTimeout(() => syncIndicator.classList.add('opacity-0'), 1000);
      }

      function getRootSVG() {
        return renderTarget.querySelector('svg');
      }

      // -- Toolbar State Management --
      function updateToolbarState() {
        const btnGroup = document.getElementById('btn-group');
        const btnUngroup = document.getElementById('btn-ungroup');
        const btnUndo = document.getElementById('btn-undo');
        const btnBringFront = document.getElementById('btn-bring-front');
        const btnSendBack = document.getElementById('btn-send-back');

        // Can group if multiple elements are selected
        const canGroup = selectedElements.length > 1;
        // Can ungroup if at least one of the selected elements is a group (<g>)
        const canUngroup = selectedElements.some(el => el.tagName && el.tagName.toLowerCase() === 'g');
        // Can layer if anything is selected
        const canLayer = selectedElements.length > 0;

        const enableClass = "px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-sm font-medium rounded-md transition-colors border border-indigo-200 cursor-pointer opacity-100";
        const disableClass = "px-3 py-1.5 bg-gray-50 text-gray-400 text-sm font-medium rounded-md transition-colors border border-gray-200 cursor-not-allowed opacity-60";

        if (canGroup) {
          btnGroup.disabled = false;
          btnGroup.className = enableClass;
        } else {
          btnGroup.disabled = true;
          btnGroup.className = disableClass;
        }

        if (canUngroup) {
          btnUngroup.disabled = false;
          btnUngroup.className = enableClass;
        } else {
          btnUngroup.disabled = true;
          btnUngroup.className = disableClass;
        }

        if (canLayer) {
          btnBringFront.disabled = false;
          btnSendBack.disabled = false;
          btnBringFront.className = "p-1.5 hover:bg-gray-50 border-r border-gray-200 text-gray-700 transition-colors cursor-pointer opacity-100";
          btnSendBack.className = "p-1.5 hover:bg-gray-50 text-gray-700 transition-colors cursor-pointer opacity-100";
        } else {
          btnBringFront.disabled = true;
          btnSendBack.disabled = true;
          btnBringFront.className = "p-1.5 hover:bg-gray-50 border-r border-gray-200 text-gray-400 transition-colors cursor-not-allowed opacity-60";
          btnSendBack.className = "p-1.5 hover:bg-gray-50 text-gray-400 transition-colors cursor-not-allowed opacity-60";
        }

        if (undoStack.length > 0) {
          btnUndo.disabled = false;
          btnUndo.className = "px-3 py-1.5 bg-white hover:bg-gray-50 text-gray-700 text-sm font-medium rounded-md transition-colors border border-gray-300 shadow-sm ml-2 flex items-center gap-1 cursor-pointer opacity-100";
        } else {
          btnUndo.disabled = true;
          btnUndo.className = "px-3 py-1.5 bg-gray-50 text-gray-400 text-sm font-medium rounded-md transition-colors border border-gray-200 ml-2 flex items-center gap-1 cursor-not-allowed opacity-60";
        }
      }

      // -- Sidebar Properties Logic --
      function populateProperties() {
          const content = document.getElementById('properties-content');
          
          if (selectedElements.length !== 1) {
              content.innerHTML = '<p class="text-xs text-gray-400 italic text-center mt-4">Select a single object to edit its properties.</p>';
              currentPropElement = null;
              return;
          }

          const el = selectedElements[0];

          // If same element, just update input values (avoid losing user's focus)
          if (currentPropElement === el) {
              const inputs = content.querySelectorAll('[data-attr]');
              inputs.forEach(input => {
                  if (document.activeElement === input) return; // Don't interrupt typing
                  const attr = input.getAttribute('data-attr');
                  if (attr === 'text-content') {
                      input.value = el.textContent;
                  } else {
                      input.value = el.getAttribute(attr) || '';
                  }
              });

              const pickers = content.querySelectorAll('[data-color-picker]');
              pickers.forEach(picker => {
                  if (document.activeElement === picker) return;
                  const attr = picker.getAttribute('data-color-picker');
                  const val = el.getAttribute(attr) || '';
                  if (/^#[0-9A-F]{6}$/i.test(val)) {
                      picker.value = val;
                  }
              });
              return;
          }

          currentPropElement = el;
          content.innerHTML = ''; // Rebuild form

          const tag = el.tagName.toLowerCase();
          const attrs = [];

          if (tag === 'rect') attrs.push('x', 'y', 'width', 'height', 'rx', 'ry');
          else if (tag === 'circle') attrs.push('cx', 'cy', 'r');
          else if (tag === 'ellipse') attrs.push('cx', 'cy', 'rx', 'ry');
          else if (tag === 'line') attrs.push('x1', 'y1', 'x2', 'y2');
          else if (tag === 'text') attrs.push('x', 'y', 'font-size', 'font-family');
          else if (tag === 'polygon' || tag === 'polyline') attrs.push('points');
          else if (tag === 'path') attrs.push('d');
          
          // Common properties
          attrs.push('fill', 'stroke', 'stroke-width', 'opacity', 'transform');

          // Helper to apply attributes directly
          const updateAttr = (attr, val) => {
              if (attr === 'text-content') {
                  el.textContent = val;
              } else {
                  if (val === '') el.removeAttribute(attr);
                  else el.setAttribute(attr, val);
              }
              // Update handles & visual state
              updateSelectionOverlay();
              updateCodeFromDOM();
          };

          // Build Text Content Editor
          if (tag === 'text') {
              const div = document.createElement('div');
              div.className = 'flex flex-col gap-1 mb-2';
              div.innerHTML = `
                  <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Text Content</label>
                  <input type="text" data-attr="text-content" class="w-full px-2 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
              `;
              const input = div.querySelector('input');
              input.value = el.textContent;
              input.addEventListener('input', (e) => updateAttr('text-content', e.target.value));
              content.appendChild(div);
          }

          // Build standard property fields
          attrs.forEach(attr => {
              const div = document.createElement('div');
              div.className = 'flex flex-col gap-1 mb-2';
              
              if (attr === 'fill' || attr === 'stroke') {
                  div.innerHTML = `
                      <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">${attr}</label>
                      <div class="flex gap-2 items-center">
                          <input type="color" data-color-picker="${attr}" class="w-8 h-8 p-0 border-0 rounded cursor-pointer overflow-hidden shrink-0 bg-transparent">
                          <input type="text" data-attr="${attr}" class="flex-1 w-full px-2 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all font-mono text-xs" placeholder="none">
                      </div>
                  `;
                  const textInput = div.querySelector('input[type="text"]');
                  const colorInput = div.querySelector('input[type="color"]');
                  
                  const currentVal = el.getAttribute(attr) || '';
                  textInput.value = currentVal;
                  
                  // Color picker input strictly requires a valid 6-char hex code
                  if (/^#[0-9A-F]{6}$/i.test(currentVal)) {
                      colorInput.value = currentVal;
                  } else {
                      colorInput.value = '#000000'; // visually default to black if none/named color
                  }

                  // Typing in the text input updates both SVG and the swatch picker
                  textInput.addEventListener('input', (e) => {
                      updateAttr(attr, e.target.value);
                      if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                          colorInput.value = e.target.value;
                      }
                  });

                  // Clicking the swatch picker updates both SVG and the text input
                  colorInput.addEventListener('input', (e) => {
                      textInput.value = e.target.value;
                      updateAttr(attr, e.target.value);
                  });

              } else {
                  // Standard text/number inputs
                  div.innerHTML = `
                      <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">${attr}</label>
                      <input type="text" data-attr="${attr}" class="w-full px-2 py-1.5 bg-gray-50 border border-gray-200 rounded-md text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all font-mono text-xs">
                  `;
                  const input = div.querySelector('input');
                  input.value = el.getAttribute(attr) || '';
                  input.addEventListener('input', (e) => updateAttr(attr, e.target.value));
              }
              content.appendChild(div);
          });
      }

      // Format SVG string cleanly to preserve beautiful properties
      function cleanAndFormatSVG(svgNode) {
        const clone = svgNode.cloneNode(true);
        // Clean out our own temporary markers if any
        let str = new XMLSerializer().serializeToString(clone);
        str = str.replace(/ xmlns="http:\/\/www\.w3\.org\/2000\/svg"/g, '');
        str = str.replace(/<svg\s/, '<svg xmlns="http://www.w3.org/2000/svg" ');
        // Basic pretty print
        return str
          .replace(/(>)(<)(?!\/)(?!g>)(?!defs>)/g, '$1\n  $2')
          .replace(/(>)(<\/g>)/g, '$1\n$2')
          .replace(/(>)(<\/svg>)/g, '$1\n$2');
      }

      // -- Sync Mechanisms & Code Highlighting --

      function highlightSelectionInCode() {
        // Clear previous highlight
        backdropEl.innerHTML = '';
        
        if (selectedElements.length === 0) return;
        
        const svg = getRootSVG();
        if (!svg) return;

        // Create an exact linear array of all elements: the root SVG, plus all descendants in document order
        const allNodes = [svg, ...Array.from(svg.querySelectorAll('*'))];
        
        // Find document indices for all selected elements and sort them ascending
        const targetIndices = selectedElements
            .map(el => allNodes.indexOf(el))
            .filter(idx => idx !== -1)
            .sort((a, b) => a - b);
        
        if (targetIndices.length === 0) return;
        
        const codeStr = codeEl.value;
        // Regex strictly matches opening tags, ignoring closing tags like </rect> to perfectly sync with DOM array
        const tagRegex = /<(?!\/)[a-zA-Z0-9:-]+/g;
        let match;
        let currentIndex = 0;
        
        // Collect string ranges for every selected target
        const highlightRanges = [];
        let nextTargetObj = 0; // Pointer to targetIndices array
        
        while ((match = tagRegex.exec(codeStr)) !== null && nextTargetObj < targetIndices.length) {
            if (currentIndex === targetIndices[nextTargetObj]) {
                const startIdx = match.index;
                let endIdx = codeStr.indexOf('>', startIdx);
                if (endIdx !== -1) {
                    highlightRanges.push({ start: startIdx, end: endIdx + 1 });
                }
                nextTargetObj++;
            }
            currentIndex++;
        }
        
        if (highlightRanges.length > 0) {
            // Build the multi-highlight HTML string piece by piece
            const escape = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            let backdropHtml = "";
            let lastPos = 0;

            for (const range of highlightRanges) {
                const before = codeStr.substring(lastPos, range.start);
                const highlight = codeStr.substring(range.start, range.end);
                
                backdropHtml += escape(before);
                backdropHtml += `<mark class="bg-indigo-500/40 text-transparent rounded-sm">${escape(highlight)}</mark>`;
                lastPos = range.end;
            }
            backdropHtml += escape(codeStr.substring(lastPos));
            
            backdropEl.innerHTML = backdropHtml;
            
            // Manage scroll and primary selection using the *first* item in document order to prevent UI jumps
            const firstRange = highlightRanges[0];
            if (document.activeElement !== codeEl) {
                codeEl.setSelectionRange(firstRange.start, firstRange.end);
                const lines = codeStr.substring(0, firstRange.start).split('\n').length;
                // Approximate line height ~ 21px
                codeEl.scrollTop = Math.max(0, (lines - 4) * 21);
            }
        }
      }

      function pushToUndoStack(stateString) {
        if (undoStack.length === 0 || undoStack[undoStack.length - 1] !== stateString) {
            undoStack.push(stateString);
            if (undoStack.length > 50) undoStack.shift(); // Max 50 undos
        }
        updateToolbarState();
      }

      function performUndo() {
        if (undoStack.length > 0) {
            const previousState = undoStack.pop();
            codeEl.value = previousState;
            updateDOMFromCode();
            updateToolbarState();
            showToast('Undo successful');
        } else {
            showToast('Nothing to undo', 'info');
        }
      }

      function updateCodeFromDOM() {
        if (isSyncing) return;
        const svg = getRootSVG();
        if (!svg) return;
        
        const newSVGStr = cleanAndFormatSVG(svg);
        
        // Only update (and save undo state) if something actually changed
        if (codeEl.value !== newSVGStr) {
            isSyncing = true;
            pushToUndoStack(codeEl.value); // Save the OLD state before overwriting
            codeEl.value = newSVGStr;
            flashSyncIndicator();
            isSyncing = false;
        }

        // Always re-apply code highlight after DOM sync
        if (!activeAction && !isArrowMoving) {
            highlightSelectionInCode();
        }
      }

      function updateDOMFromCode() {
        if (isSyncing) return;
        isSyncing = true;
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(codeEl.value, "image/svg+xml");
        const errorNode = doc.querySelector('parsererror');
        
        if (!errorNode) {
          renderTarget.innerHTML = '';
          const svg = doc.documentElement;

          // MATCH CONTAINER SIZE TO VIEWBOX
          const viewBoxAttr = svg.getAttribute('viewBox');
          if (viewBoxAttr) {
            const vb = viewBoxAttr.split(/[\s,]+/).map(parseFloat);
            if (vb.length === 4) {
              const vbWidth = vb[2];
              const vbHeight = vb[3];
              if (!isNaN(vbWidth) && !isNaN(vbHeight)) {
                canvasContainer.style.width = `${vbWidth}px`;
                canvasContainer.style.height = `${vbHeight}px`;
              }
            }
          } else {
            // Fallback to width/height attributes if viewBox is missing
            const wAttr = parseFloat(svg.getAttribute('width'));
            const hAttr = parseFloat(svg.getAttribute('height'));
            if (!isNaN(wAttr) && !isNaN(hAttr)) {
              canvasContainer.style.width = `${wAttr}px`;
              canvasContainer.style.height = `${hAttr}px`;
            }
          }

          // Ensure it stretches to fill the now-perfectly-sized container
          svg.setAttribute('width', '100%');
          svg.setAttribute('height', '100%');
          
          renderTarget.appendChild(svg);
          selectedElements = []; // Reset selection on manual code edit to prevent stale refs
          updateSelectionOverlay();
          flashSyncIndicator();
        }
        
        isSyncing = false;
      }

      let typeTimeout;
      codeEl.addEventListener('input', () => {
        backdropEl.innerHTML = ''; // clear backdrop when typing immediately
        clearTimeout(typeTimeout);
        typeTimeout = setTimeout(updateDOMFromCode, 500);
      });

      // -- Native SVG Math & Coordinates --
      function getSVGPoint(clientX, clientY) {
        const svg = getRootSVG();
        const pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
      }

      // Convert screen coords to the local coordinate system of a specific SVG element
      function getLocalSVGPoint(clientX, clientY, element) {
        const svg = getRootSVG();
        const pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        return pt.matrixTransform(element.getScreenCTM().inverse());
      }

      // Calculate true bounding box (accounts for transforms like translate/scale on groups)
      function getSVGBBox(el) {
        const svg = getRootSVG();
        const rect = el.getBoundingClientRect();
        
        const pt1 = svg.createSVGPoint();
        const pt2 = svg.createSVGPoint();
        
        pt1.x = rect.left;
        pt1.y = rect.top;
        pt2.x = rect.right;
        pt2.y = rect.bottom;
        
        const matrix = svg.getScreenCTM().inverse();
        const p1 = pt1.matrixTransform(matrix);
        const p2 = pt2.matrixTransform(matrix);
        
        return {
            x: Math.min(p1.x, p2.x),
            y: Math.min(p1.y, p2.y),
            width: Math.abs(p2.x - p1.x),
            height: Math.abs(p2.y - p1.y)
        };
      }

      function updateSelectionOverlay() {
        // Update the visual state of the toolbar buttons based on selection
        updateToolbarState();

        if (selectedElements.length === 0) {
          selectionOverlay.style.display = 'none';
          populateProperties(); // Will trigger empty state
          
          if (!activeAction && !isArrowMoving && document.activeElement !== codeEl) {
              backdropEl.innerHTML = ''; // Clear highlight when nothing is selected
          }
          return;
        }

        const containerRect = canvasContainer.getBoundingClientRect();
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

        // Use getBoundingClientRect for screen-space overlay positioning
        selectedElements.forEach(el => {
          const rect = el.getBoundingClientRect();
          minX = Math.min(minX, rect.left);
          minY = Math.min(minY, rect.top);
          maxX = Math.max(maxX, rect.right);
          maxY = Math.max(maxY, rect.bottom);
        });

        // Add small padding
        const pad = 4;
        const overlayLeft = (minX - containerRect.left) - pad;
        const overlayTop = (minY - containerRect.top) - pad;

        selectionOverlay.style.display = 'block';
        selectionOverlay.style.left = `${overlayLeft}px`;
        selectionOverlay.style.top = `${overlayTop}px`;
        selectionOverlay.style.width = `${(maxX - minX) + (pad*2)}px`;
        selectionOverlay.style.height = `${(maxY - minY) + (pad*2)}px`;

        const standardHandles = document.querySelectorAll('.standard-handle');
        const lineHandles = document.querySelectorAll('.line-handle');

        // Check if single line is selected for specific point editing
        if (selectedElements.length === 1 && selectedElements[0].tagName.toLowerCase() === 'line') {
            standardHandles.forEach(h => h.style.display = 'none');
            lineHandles.forEach(h => h.style.display = 'block');
            
            // Hide the rectangular selection border so only the two endpoints show
            selectionOverlay.classList.remove('border', 'border-indigo-500');
            selectionOverlay.style.background = 'transparent';

            const line = selectedElements[0];
            const matrix = line.getScreenCTM();
            const svg = getRootSVG();
            
            // Map line coordinates back to screen coordinates
            const pt1 = svg.createSVGPoint();
            pt1.x = parseFloat(line.getAttribute('x1') || 0);
            pt1.y = parseFloat(line.getAttribute('y1') || 0);
            const sp1 = pt1.matrixTransform(matrix);
            
            const pt2 = svg.createSVGPoint();
            pt2.x = parseFloat(line.getAttribute('x2') || 0);
            pt2.y = parseFloat(line.getAttribute('y2') || 0);
            const sp2 = pt2.matrixTransform(matrix);

            // Position handles relative to the overlay div
            document.getElementById('handle-line-p1').style.left = `${sp1.x - containerRect.left - overlayLeft}px`;
            document.getElementById('handle-line-p1').style.top = `${sp1.y - containerRect.top - overlayTop}px`;
            
            document.getElementById('handle-line-p2').style.left = `${sp2.x - containerRect.left - overlayLeft}px`;
            document.getElementById('handle-line-p2').style.top = `${sp2.y - containerRect.top - overlayTop}px`;

        } else {
            // Standard mode
            standardHandles.forEach(h => h.style.display = 'block');
            lineHandles.forEach(h => h.style.display = 'none');
            selectionOverlay.classList.add('border', 'border-indigo-500');
            selectionOverlay.style.background = 'rgba(79, 70, 229, 0.05)';
        }

        // Populate properties sidebar
        populateProperties();
        
        // Update code highlight passively
        if (!activeAction && !isArrowMoving) {
            highlightSelectionInCode();
        }
      }

      // The core feature: applying deltas safely to raw properties!
      function applyDelta(target, orig, dx, dy) {
        const tag = target.tagName.toLowerCase();
        
        if (['rect', 'text', 'image', 'use'].includes(tag)) {
            target.setAttribute('x', parseFloat(orig.getAttribute('x') || 0) + dx);
            target.setAttribute('y', parseFloat(orig.getAttribute('y') || 0) + dy);
        } else if (['circle', 'ellipse'].includes(tag)) {
            target.setAttribute('cx', parseFloat(orig.getAttribute('cx') || 0) + dx);
            target.setAttribute('cy', parseFloat(orig.getAttribute('cy') || 0) + dy);
        } else if (tag === 'line') {
            target.setAttribute('x1', parseFloat(orig.getAttribute('x1') || 0) + dx);
            target.setAttribute('y1', parseFloat(orig.getAttribute('y1') || 0) + dy);
            target.setAttribute('x2', parseFloat(orig.getAttribute('x2') || 0) + dx);
            target.setAttribute('y2', parseFloat(orig.getAttribute('y2') || 0) + dy);
        } else if (['polygon', 'polyline'].includes(tag)) {
            const pointsStr = orig.getAttribute('points');
            if (pointsStr) {
                const points = pointsStr.trim().split(/[\s,]+/).filter(p => p);
                const newPoints = [];
                for (let i=0; i<points.length; i+=2) {
                    newPoints.push(`${parseFloat(points[i]) + dx},${parseFloat(points[i+1] || 0) + dy}`);
                }
                target.setAttribute('points', newPoints.join(' '));
            }
        } else {
            // Fallback to safe translate injection for groups and paths
            let transform = orig.getAttribute('transform') || '';
            // Robust regex to capture both translate(x, y) and translate(x) with any spacing
            const match = transform.match(/translate\(([-0-9.]+)(?:[\s,]+([-0-9.]+))?\)/);
            if (match) {
                const tx = parseFloat(match[1]) + dx;
                const ty = (match[2] !== undefined ? parseFloat(match[2]) : 0) + dy;
                target.setAttribute('transform', transform.replace(match[0], `translate(${tx}, ${ty})`));
            } else {
                target.setAttribute('transform', `translate(${dx}, ${dy}) ${transform}`.trim());
            }
        }
      }

      function applyScale(target, orig, sx, sy, originX, originY) {
        const tag = target.tagName.toLowerCase();
        
        if (['rect', 'image'].includes(tag)) {
            const w = parseFloat(orig.getAttribute('width') || 0);
            const h = parseFloat(orig.getAttribute('height') || 0);
            const x = parseFloat(orig.getAttribute('x') || 0);
            const y = parseFloat(orig.getAttribute('y') || 0);
            
            target.setAttribute('width', Math.max(1, w * sx));
            target.setAttribute('height', Math.max(1, h * sy));
            target.setAttribute('x', originX + (x - originX) * sx);
            target.setAttribute('y', originY + (y - originY) * sy);
        } else if (tag === 'circle') {
            const r = parseFloat(orig.getAttribute('r') || 0);
            const cx = parseFloat(orig.getAttribute('cx') || 0);
            const cy = parseFloat(orig.getAttribute('cy') || 0);
            const scale = Math.max(sx, sy); 
            
            target.setAttribute('r', Math.max(1, r * scale));
            target.setAttribute('cx', originX + (cx - originX) * sx);
            target.setAttribute('cy', originY + (cy - originY) * sy);
        } else if (tag === 'ellipse') {
            const rx = parseFloat(orig.getAttribute('rx') || 0);
            const ry = parseFloat(orig.getAttribute('ry') || 0);
            const cx = parseFloat(orig.getAttribute('cx') || 0);
            const cy = parseFloat(orig.getAttribute('cy') || 0);
            
            target.setAttribute('rx', Math.max(1, rx * sx));
            target.setAttribute('ry', Math.max(1, ry * sy));
            target.setAttribute('cx', originX + (cx - originX) * sx);
            target.setAttribute('cy', originY + (cy - originY) * sy);
        } else if (tag === 'line') {
            // Allows lines inside of groups to scale properly via the bounding box
            const x1 = parseFloat(orig.getAttribute('x1') || 0);
            const y1 = parseFloat(orig.getAttribute('y1') || 0);
            const x2 = parseFloat(orig.getAttribute('x2') || 0);
            const y2 = parseFloat(orig.getAttribute('y2') || 0);
            
            target.setAttribute('x1', originX + (x1 - originX) * sx);
            target.setAttribute('y1', originY + (y1 - originY) * sy);
            target.setAttribute('x2', originX + (x2 - originX) * sx);
            target.setAttribute('y2', originY + (y2 - originY) * sy);
        } else if (['polygon', 'polyline'].includes(tag)) {
            const points = orig.getAttribute('points').trim().split(/[\s,]+/).filter(p => p);
            const newPoints = [];
            for (let i=0; i<points.length; i+=2) {
                const px = parseFloat(points[i]);
                const py = parseFloat(points[i+1]);
                newPoints.push(`${originX + (px - originX) * sx},${originY + (py - originY) * sy}`);
            }
            target.setAttribute('points', newPoints.join(' '));
        } else {
            // Group, Path fallback via transform
            let transform = orig.getAttribute('transform') || '';
            target.setAttribute('transform', `${transform} translate(${originX}, ${originY}) scale(${sx}, ${sy}) translate(${-originX}, ${-originY})`.trim());
        }
      }

      // -- Interaction Engine --
      let activeAction = null; // 'drag', 'resize'
      let startPt = null;
      let origState = new Map();
      let groupBBox = null;
      let resizeDir = null;

      canvasContainer.addEventListener('mousedown', (e) => {
        // Resize check
        if (e.target.classList.contains('resize-handle')) {
          resizeDir = e.target.id;
          
          if (resizeDir.startsWith('handle-line')) {
            activeAction = 'resize-line';
          } else {
            activeAction = 'resize';
            
            // Get group bounding box in SVG space to act as scale origin
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            selectedElements.forEach(el => {
                const bbox = getSVGBBox(el); 
                minX = Math.min(minX, bbox.x);
                minY = Math.min(minY, bbox.y);
                maxX = Math.max(maxX, bbox.x + bbox.width);
                maxY = Math.max(maxY, bbox.y + bbox.height);
            });
            groupBBox = {x: minX, y: minY, width: maxX - minX, height: maxY - minY};
          }
          
          startPt = getSVGPoint(e.clientX, e.clientY);
          origState.clear();
          selectedElements.forEach(el => origState.set(el, el.cloneNode(true)));
          
          e.preventDefault();
          return;
        }

        let target = e.target;
        const svg = getRootSVG();
        
        // Drag check (element must be inside SVG, but not the SVG background itself)
        if (svg.contains(target) && target !== svg) {
          
          // If clicked inside a group, select the top-most group instead of the child element
          let current = target;
          let highestG = null;
          while (current && current !== svg) {
            if (current.tagName && current.tagName.toLowerCase() === 'g') {
              highestG = current;
            }
            current = current.parentNode;
          }
          if (highestG) {
            target = highestG;
          }

          activeAction = 'drag';
          
          if (e.shiftKey) {
            if (!selectedElements.includes(target)) selectedElements.push(target);
          } else {
            if (!selectedElements.includes(target)) selectedElements = [target];
          }
          
          startPt = getSVGPoint(e.clientX, e.clientY);
          origState.clear();
          selectedElements.forEach(el => origState.set(el, el.cloneNode(true)));
          
          updateSelectionOverlay();
          e.preventDefault();
        } else {
          // Clicked empty space - start marquee selection
          activeAction = 'marquee';
          marqueeStart = { x: e.clientX, y: e.clientY };
          
          if (!e.shiftKey) {
            selectedElements = [];
            updateSelectionOverlay();
          }

          const rect = canvasContainer.getBoundingClientRect();
          const marqueeBox = document.getElementById('marquee-box');
          marqueeBox.style.display = 'block';
          marqueeBox.style.left = `${e.clientX - rect.left}px`;
          marqueeBox.style.top = `${e.clientY - rect.top}px`;
          marqueeBox.style.width = '0px';
          marqueeBox.style.height = '0px';
          
          e.preventDefault();
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (!activeAction) return;
        
        const currentPt = getSVGPoint(e.clientX, e.clientY);
        const dx = currentPt.x - startPt?.x;
        const dy = currentPt.y - startPt?.y;

        if (activeAction === 'drag') {
          if (selectedElements.length === 0) return;
          selectedElements.forEach(el => applyDelta(el, origState.get(el), dx, dy));
        } else if (activeAction === 'marquee') {
          const rect = canvasContainer.getBoundingClientRect();
          const minX = Math.min(marqueeStart.x, e.clientX);
          const minY = Math.min(marqueeStart.y, e.clientY);
          const maxX = Math.max(marqueeStart.x, e.clientX);
          const maxY = Math.max(marqueeStart.y, e.clientY);

          const marqueeBox = document.getElementById('marquee-box');
          marqueeBox.style.left = `${minX - rect.left}px`;
          marqueeBox.style.top = `${minY - rect.top}px`;
          marqueeBox.style.width = `${maxX - minX}px`;
          marqueeBox.style.height = `${maxY - minY}px`;
          return; // Skip updating selection overlay during marquee draw
        } else if (activeAction === 'resize-line') {
          if (selectedElements.length === 0) return;
          const line = selectedElements[0];
          // Get the mouse coordinate precisely mapped inside the line's own local transformation matrix
          const localPt = getLocalSVGPoint(e.clientX, e.clientY, line);
          
          if (resizeDir === 'handle-line-p1') {
            line.setAttribute('x1', localPt.x);
            line.setAttribute('y1', localPt.y);
          } else if (resizeDir === 'handle-line-p2') {
            line.setAttribute('x2', localPt.x);
            line.setAttribute('y2', localPt.y);
          }
        } else if (activeAction === 'resize') {
          // Determine scaling dynamically based on handle ID suffix (e.g. 'tl', 'r', 'b')
          const dir = resizeDir.split('-')[1]; 
          let sx = 1;
          let sy = 1;
          
          // Width scaling
          if (dir.includes('r')) {
            sx = Math.max(0.1, (groupBBox.width + dx) / groupBBox.width);
          } else if (dir.includes('l')) {
            sx = Math.max(0.1, (groupBBox.width - dx) / groupBBox.width);
          }
          
          // Height scaling
          if (dir.includes('b')) {
            sy = Math.max(0.1, (groupBBox.height + dy) / groupBBox.height);
          } else if (dir.includes('t')) {
            sy = Math.max(0.1, (groupBBox.height - dy) / groupBBox.height);
          }
          
          // Set origin to the opposite side of the dragged handle
          const originX = dir.includes('l') ? groupBBox.x + groupBBox.width : groupBBox.x;
          const originY = dir.includes('t') ? groupBBox.y + groupBBox.height : groupBBox.y;

          selectedElements.forEach(el => applyScale(el, origState.get(el), sx, sy, originX, originY));
        }

        if (activeAction !== 'marquee') {
          updateSelectionOverlay();
        }
      });

      window.addEventListener('mouseup', (e) => {
        if (activeAction === 'marquee') {
          const marqueeBox = document.getElementById('marquee-box');
          marqueeBox.style.display = 'none';
          
          const endX = e.clientX;
          const endY = e.clientY;
          
          const mRect = {
              left: Math.min(marqueeStart.x, endX),
              top: Math.min(marqueeStart.y, endY),
              right: Math.max(marqueeStart.x, endX),
              bottom: Math.max(marqueeStart.y, endY)
          };
          
          // Only select if it was an actual drag (larger than a simple click)
          if (mRect.right - mRect.left > 2 || mRect.bottom - mRect.top > 2) {
              const svg = getRootSVG();
              const newSelection = [];
              
              // Only loop top-level elements, groups will naturally encapsulate their children
              Array.from(svg.children).forEach(el => {
                  if (el.tagName.toLowerCase() === 'defs') return;
                  
                  const elRect = el.getBoundingClientRect();
                  
                  // Check intersection with marquee box
                  const isIntersecting = !(
                      mRect.right < elRect.left ||
                      mRect.left > elRect.right ||
                      mRect.bottom < elRect.top ||
                      mRect.top > elRect.bottom
                  );
                  
                  if (isIntersecting) {
                      newSelection.push(el);
                  }
              });
              
              if (e.shiftKey) {
                  newSelection.forEach(ns => {
                      if (!selectedElements.includes(ns)) selectedElements.push(ns);
                  });
              } else {
                  selectedElements = newSelection;
              }
              
              activeAction = null; // Clear BEFORE update to allow highlighting
              updateSelectionOverlay();
          } else {
              activeAction = null;
              if (!e.shiftKey && selectedElements.length === 0) {
                  if (document.activeElement !== codeEl) codeEl.setSelectionRange(0, 0);
                  backdropEl.innerHTML = '';
              }
          }
        } else if (activeAction) {
          activeAction = null; // Clear BEFORE update
          updateCodeFromDOM();
        }
      });

      // Keyboard delete, Undo & Arrow Movement
      let isArrowMoving = false;

      window.addEventListener('keydown', (e) => {
        // Ctrl+Z or Cmd+Z for Undo
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
          // Ignore if user is manually typing in the code editor or properties (let native undo handle that)
          if (document.activeElement.tagName !== 'INPUT' && document.activeElement !== codeEl) {
            e.preventDefault();
            performUndo();
          }
          return;
        }

        if (document.activeElement === codeEl || document.activeElement.tagName === 'INPUT') return;
        
        // Delete / Backspace
        if (e.key === 'Delete' || e.key === 'Backspace') {
          if (selectedElements.length) {
            selectedElements.forEach(el => el.remove());
            selectedElements = [];
            updateSelectionOverlay();
            updateCodeFromDOM();
            showToast('Object(s) deleted');
            e.preventDefault(); // Prevent browser back navigation on Backspace
          }
          return;
        }

        // Arrow Keys Movement
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
          if (selectedElements.length > 0) {
            e.preventDefault(); // Prevent page scrolling while moving shapes
            isArrowMoving = true;
            
            const step = e.shiftKey ? 10 : 1; // 10px with Shift, 1px normally
            let dx = 0, dy = 0;
            
            if (e.key === 'ArrowUp') dy = -step;
            if (e.key === 'ArrowDown') dy = step;
            if (e.key === 'ArrowLeft') dx = -step;
            if (e.key === 'ArrowRight') dx = step;

            selectedElements.forEach(el => {
                // Apply the delta against its immediate current state
                applyDelta(el, el.cloneNode(true), dx, dy);
            });
            
            updateSelectionOverlay();
            // We do NOT call updateCodeFromDOM() here to prevent flooding the undo stack when holding the key down.
          }
        }
      });

      // Commit arrow movement to code/undo stack only when key is released
      window.addEventListener('keyup', (e) => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
          if (isArrowMoving) {
            updateCodeFromDOM();
            isArrowMoving = false;
          }
        }
      });

      // -- Toolbar Actions --

      document.getElementById('btn-add-rect').addEventListener('click', () => {
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', 100 + Math.random() * 50);
        rect.setAttribute('y', 100 + Math.random() * 50);
        rect.setAttribute('width', 100);
        rect.setAttribute('height', 100);
        rect.setAttribute('fill', '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'));
        rect.setAttribute('rx', 4);
        rect.setAttribute('ry', 4);
        getRootSVG().appendChild(rect);
        selectedElements = [rect];
        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast('Rectangle added', 'success');
      });

      document.getElementById('btn-add-circle').addEventListener('click', () => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', 200 + Math.random() * 50);
        circle.setAttribute('cy', 200 + Math.random() * 50);
        circle.setAttribute('r', 50);
        circle.setAttribute('fill', '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'));
        getRootSVG().appendChild(circle);
        selectedElements = [circle];
        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast('Circle added', 'success');
      });

      document.getElementById('btn-add-line').addEventListener('click', () => {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', 100 + Math.random() * 50);
        line.setAttribute('y1', 100 + Math.random() * 50);
        line.setAttribute('x2', 250 + Math.random() * 50);
        line.setAttribute('y2', 250 + Math.random() * 50);
        line.setAttribute('stroke', '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'));
        line.setAttribute('stroke-width', '4');
        getRootSVG().appendChild(line);
        selectedElements = [line];
        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast('Line added', 'success');
      });

      document.getElementById('btn-add-text').addEventListener('click', () => {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', 200 + Math.random() * 50);
        text.setAttribute('y', 200 + Math.random() * 50);
        text.setAttribute('font-family', 'sans-serif');
        text.setAttribute('font-size', '24');
        text.setAttribute('fill', '#333333');
        text.textContent = 'New Text';
        getRootSVG().appendChild(text);
        selectedElements = [text];
        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast('Text added', 'success');
      });

      document.getElementById('btn-undo').addEventListener('click', performUndo);

      document.getElementById('btn-group').addEventListener('click', () => {
        if (selectedElements.length < 2) {
          showToast('Select multiple objects (Shift + Click) to group', 'error');
          return;
        }
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        const parent = selectedElements[0].parentNode;
        parent.insertBefore(g, selectedElements[0]);
        selectedElements.forEach(el => g.appendChild(el));
        selectedElements = [g];
        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast('Objects grouped', 'success');
      });

      document.getElementById('btn-ungroup').addEventListener('click', () => {
        const groups = selectedElements.filter(el => el.tagName.toLowerCase() === 'g');
        if (groups.length === 0) {
          showToast('Select a group to ungroup it', 'error');
          return;
        }
        let newSelection = [];
        groups.forEach(g => {
            const parent = g.parentNode;
            const parentTransform = g.getAttribute('transform') || '';
            const match = parentTransform.match(/^\s*translate\s*\(\s*([-0-9.]+)(?:[\s,]+([-0-9.]+))?\s*\)\s*$/);
            
            let dx = 0, dy = 0;
            let isSimpleTranslate = false;
            if (match) {
                dx = parseFloat(match[1]);
                dy = match[2] !== undefined ? parseFloat(match[2]) : 0;
                isSimpleTranslate = true;
            }

            Array.from(g.childNodes).forEach(child => {
                if (child.nodeType === 1) { // ELEMENT_NODE
                    if (parentTransform) {
                        if (isSimpleTranslate && !child.hasAttribute('transform') && ['rect', 'text', 'image', 'use', 'circle', 'ellipse', 'line', 'polygon', 'polyline'].includes(child.tagName.toLowerCase())) {
                            // Apply delta directly to attributes to keep SVG mathematically clean
                            applyDelta(child, child.cloneNode(true), dx, dy);
                        } else {
                            // Prepend transform to child to perfectly preserve location and appearance
                            const childTransform = child.getAttribute('transform') || '';
                            child.setAttribute('transform', `${parentTransform} ${childTransform}`.trim());
                        }
                    }
                    parent.insertBefore(child, g);
                    newSelection.push(child);
                }
            });
            parent.removeChild(g);
        });
        selectedElements = newSelection;
        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast('Objects ungrouped', 'success');
      });

      // Layering Actions
      document.getElementById('btn-bring-front').addEventListener('click', () => {
        if (selectedElements.length === 0) return;
        selectedElements.forEach(el => {
          const parent = el.parentNode;
          if (parent) {
            parent.appendChild(el); // Appending moves it to the end (top)
          }
        });
        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast('Brought to front');
      });

      document.getElementById('btn-send-back').addEventListener('click', () => {
        if (selectedElements.length === 0) return;
        // Reverse array to maintain relative stacking order of multiple selected items
        [...selectedElements].reverse().forEach(el => {
          const parent = el.parentNode;
          if (parent && parent.firstChild) {
            parent.insertBefore(el, parent.firstChild); // Prepending moves it to the start (bottom)
          }
        });
        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast('Sent to back');
      });

      // Internal Group Alignment
      function alignActiveObject(direction) {
        if (selectedElements.length < 2) {
          showToast('Select multiple objects (Shift+Click) to align them together', 'error');
          return;
        }

        // Calculate overarching BBox for the current multi-selection
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        const boxes = new Map();
        
        selectedElements.forEach(el => {
            const bbox = getSVGBBox(el); // <-- Use the new robust bounding box
            boxes.set(el, bbox);
            minX = Math.min(minX, bbox.x);
            minY = Math.min(minY, bbox.y);
            maxX = Math.max(maxX, bbox.x + bbox.width);
            maxY = Math.max(maxY, bbox.y + bbox.height);
        });
        
        const groupCenterX = minX + (maxX - minX) / 2;
        const groupCenterY = minY + (maxY - minY) / 2;

        selectedElements.forEach(el => {
            const bbox = boxes.get(el);
            let dx = 0, dy = 0;
            switch(direction) {
              case 'left': dx = minX - bbox.x; break;
              case 'right': dx = maxX - (bbox.x + bbox.width); break;
              case 'top': dy = minY - bbox.y; break;
              case 'bottom': dy = maxY - (bbox.y + bbox.height); break;
              case 'center horizontally': 
                  dx = groupCenterX - (bbox.x + bbox.width / 2);
                  break;
              case 'center vertically': 
                  dy = groupCenterY - (bbox.y + bbox.height / 2);
                  break;
            }
            if (dx !== 0 || dy !== 0) {
                applyDelta(el, el.cloneNode(true), dx, dy);
            }
        });

        updateCodeFromDOM();
        updateSelectionOverlay();
        showToast(`Objects aligned ${direction}`);
      }

      document.getElementById('btn-align-left').addEventListener('click', () => alignActiveObject('left'));
      document.getElementById('btn-align-center-h').addEventListener('click', () => alignActiveObject('center horizontally'));
      document.getElementById('btn-align-right').addEventListener('click', () => alignActiveObject('right'));
      document.getElementById('btn-align-top').addEventListener('click', () => alignActiveObject('top'));
      document.getElementById('btn-align-center-v').addEventListener('click', () => alignActiveObject('center vertically'));
      document.getElementById('btn-align-bottom').addEventListener('click', () => alignActiveObject('bottom'));

      document.getElementById('btn-clear').addEventListener('click', () => {
        getRootSVG().innerHTML = '';
        selectedElements = [];
        updateSelectionOverlay();
        updateCodeFromDOM();
        showToast('Canvas cleared');
      });

      // Initial Boot
      updateDOMFromCode();
      
      // Handle window resize properly
      window.addEventListener('resize', updateSelectionOverlay);
    });
  </script>
</body>
</html>
